<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <link rel="stylesheet" href="styless.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <h2>Digite um número e confirme para gerar uma tabuada</h2>
    <form id="multiplicacaoForm">
        <div class="conteiner">
            <div class="controleForm">
            <label for="numero">Tabuada do:</label>
            <input type="number" id="numero" name="numero" placeholder="3">
        </div>
         <div class="controleForm">
            <label for="multiplicador">Multiplicar até:</label>
            <input type="number" id="multiplicador" name="multiplicador" value="10">
        </div>
        </div>
        <div class="conteiner">
            <input type="submit" id="calcular">
        </div>
        
    </form>
    <main>
        <div id="multiplicacaoTabela">
            <h2 id="multiplicacaoTitulo"> Tabuada do número: <span></span></h2>
            <div id="multiplicacaoOperacoes">
                <p>Informe um número para calcular uma tabuada...</p>
            </div>
        </div>
    </main>
</body>
</html>
