<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="styless.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>
<body>
    <main>
        <div id="conteinerMain">
            <!-- Banner -->
            <div id="conteinerBanner">
                <img src="img/banner2.png" alt="Crie uma conta no Instagram">
            </div>
            <!-- Login e registro -->
             <div id="conteinerForm">
                <div id="formBox">
                    <img src="img/logo_instagram.png" alt="Instagram" id="logoInstagram">
                    <form id="formLogin">
                        <input type="text" name="username" placeholder="Número de telefone, usuário ou e-mail"/>
                        <input type="password" name="senha" placeholder="Sua senha">
                        <input type="submit" value="Entrar">
                    </form>
                    <!-- Separador -->
                    <div id="separador">
                        <div id="linha">
                            <span>ou</span>
                        </div>
                    </div>
                    <!-- Outros links -->
                    <div id="outrosLinks">
                        <div id="facebookLogin">
                            <a href="#"><img src="img/logo_facebook.svg" alt="facebook login">
                            <span>Entrar com o facebook</span></a>
                        </div>
                    </div>
                    <div id="esqueceuSenha">
                        <a href="#">Esqueceu a senha?</a>
                    </div>
                </div>
                <!-- Cadastro -->
                <div id="conteinerCadastro">
                    <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
                </div>
                <div id="conteinerAplicativo">
                    <p>Obtenha o aplicativo.</p>
                    <a href="#"><img src="img/apple_btn.png" alt="Apple Store"></a>
                    <a href="#"><img src="img/gplay_btn.png" alt="Google play"></a>
                </div>
             </div>
        </div>
    </main>
    <!-- Foorter -->
    <footer>
        <nav>
            <ul id="footerLinks">
                <li><a href="#">Meta</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Ajuda</a></li>
                <li><a href="#">API</a></li>
                <li><a href="#">Privacidade</a></li>
                <li><a href="#">Termos</a></li>
                <li><a href="#">Principais Contas</a></li>
                <li><a href="#">Hashtags</a></li>
                <li><a href="#">Localização</a></li>
                <li><a href="#">Instagram Lite</a></li>
            </ul>
        </nav>
        <p id="copyright">&copy;2022 Instagram from Meta</p>
    </footer>
</body>
</html>
