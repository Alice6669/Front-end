<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="conteiner">
        <!-- Cabeçalho geral -->
         <div id="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido!</h3>
         </div>
         <!-- Cabeçalho formulário -->
         <div id="formConteiner">
            <div id="formCabecalho">
                <p>Formulário</p>
            </div>
            <!-- Corpo do formulário -->
            <div id="formBody">
                <h1 id="tituloPrincipal"> Venda fácil seu carro! </h1>
                <p>
                    Descreva as características e marque os opcionais que ele possui
                </p>
                <form action="">
                    <div class="caixaInput">
                        <label for="titulo">Título do anúncio <span class="obrigatorio">*</span></label>
                        <input type="text" name="titulo" id="titulo" class="block" placeholder=
                        "Um título para anunciar seu carro." minlength="1" maxlength="30" required>
                    </div>
                    <div class="caixaInput">
                        <label for="preco">Preço <span class="obrigatorio">*</span></label>
                        <input type="text" name="preco" id="preco" class="block" placeholder=
                        "Defina um preço." required>
                    </div>
                    <div class="caixaInput">
                        <label for="descricao">Descrição <span class="obrigatorio">*</span></label>
                        <textarea name="descricao" id="descricao" class="block" placeholder=
                        "Coloque os detalhes sobre os veículo, por exemplo: se ele tem algum aranhão." required ></textarea>
                    </div>
                    <div class="caixaInput">
                        <label for="marca">Marca<span class="obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder=
                        "Digite a marca do veículo." required>
                    </div>
                    <div class="caixaInput">
                        <label for="modelo">Modelo<span class="obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder=
                        "Digite a modelo do veículo." required>
                    </div>
                    <div class="caixaInput">
                        <label for="kilometragem">Kilometragem<span class="obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder=
                        "Digite a kilometragem do veículo." required>
                    </div>
                    <div class="caixaInput">
                        <label for="kilometragem">Kilometragem<span class="obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder=
                        "Digite a kilometragem do veículo." required>
                    </div>
                    <div class="caixaInput">
                        <label for="DataCompra">Data Comprado<span class="obrigatorio">*</span></label>
                        <input type="date" name="DataCompra" id="DataCompra" class="block" required>
                    </div>
                    <div class="caixaInput">
                        <p>Tipo de câmbio: <span class="obrigatorio">*</span></p>
                        <input type="radio" name="gear" id="manual" >
                        <label for="manual">manual</label>
                        <input type="radio" name="gear" id="automatico" >
                        <label for="automatico">automático</label>
                    </div>
                    <div class="caixaOpcionais">
                        <p>Opcionais</p>
                        <ul class="opcionaisLista">
                            <li>
                                <input type="checkbox"
                                id="airbag"
                                name="opcional[]"
                                value="airbag">
                                <label for="airbag">Airbag</label>
                            </li>
                            <li>
                                <input type="checkbox"
                                id="alarme"
                                name="opcional[]"
                                value="alarme">
                                <label for="alarme">Alarme</label>
                            </li>
                            <li>
                                <input type="checkbox"
                                id="ac"
                                name="opcional[]"
                                value="ac">
                                <label for="ac">Ar condicionado</label>
                            </li>
                            <li>
                                <input type="checkbox"
                                id="assitentePista"
                                name="opcional[]"
                                value="assitentePista">
                                <label for="assitentePista">Assitente de pista</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaOpcionais">
                        <ul class="opcionaisLista">
                            <li>
                                <input type="checkbox"
                                id="keyLess"
                                name="opcional[]"
                                value="keyLess">
                                <label for="keyLess">Partida sem chave</label>
                            </li>
                            <li>
                                <input type="checkbox"
                                id="celular"
                                name="opcional[]"
                                value="celular">
                                <label for="celular">Integração com celular</label>
                            </li>
                            <li>
                                <input type="checkbox"
                                id="bancoCouro"
                                name="opcional[]"
                                value="bancoCouro">
                                <label for="bancoCouro">Banco de couro</label>
                            </li>
                            <li>
                                <input type="checkbox"
                                id="cameraRe"
                                name="opcional[]"
                                value="cameraRe">
                                <label for="cameraRe">Câmera de ré</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaInput">
                        <p>Fotos do carro: <span class="obrigatorio">*</span></p>
                        <input type="file" name="imagem" id="imagem" required
                         multiple accept="image/png, image/jpg" >
                    </div>
                    </div>
                    <input type="submit" value="Enviar" id="submit">
                </form>
            </div>
         </div>
    </div>
</body>
</html>
