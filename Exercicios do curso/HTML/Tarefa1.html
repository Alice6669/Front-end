</head>
<body>
    <div>
        <!-- Título -->
        <h1>A vida na natureza</h1>

        </p>
        <!-- Lista -->

            <li>Ârvores</li>
            <li>Lago</li>
            <li>Cervo</li>
        </ul>
    </div>
