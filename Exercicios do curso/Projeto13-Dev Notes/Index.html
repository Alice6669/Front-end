<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev notes</title>
    <!-- Bootstrap icons -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Estilos -->
     <link rel="stylesheet" href="styles.css">
    <!-- JavaScript -->
     <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <h1>Dev Notes</h1>
        <div id="buscaConteiner">
            <i class="bi bi-search"></i>
            <input type="text" id="buscaInput" placeholder="Busque por uma nota">
        </div>
        <button id="exportarNotes"> Exportar CSV <i class="bi bi-download"></i></button>
    </header>
    <div id="adicionarNotaConteiner">
        <input type="text" id="noteConteudo" placeholder="O que deseja anotar?">
        <button class="adicionarNota"><i class="bi bi-plus-lg"></i></button>
    </div>
    <div id="notesConteiner">
    </div>

</body>
</html>
