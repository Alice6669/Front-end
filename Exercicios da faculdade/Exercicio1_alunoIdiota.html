    <title>O aluno esperto</title>
</head>
<body>
    <hr>
    <p>
        Na sala de aula o professor pergunta: <br>
        ---Quem fez a lição de casa? <br>
        Um aluno levanta a mão e responde: --- <b>Professora, eu não fiz,</b> <br>
        mas <u>posso explicar o motivo.</u>
    </p>
    <br>
    <p>
        A professora, curiosa, <i>pergunta:</i> <br>
        ---Então diga, qual o motivo?
    </p>
    <br>
    <p>
        O aluno diz com firmeza: --- <s>Preguiça</s> <b>Faltou energia em casa!</b>;
    </p>
</body>
</html>
